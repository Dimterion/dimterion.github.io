<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/hud-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap"
      rel="stylesheet"
    />
    <title>HUD</title>
  </head>
  <body class="hud-page">
    <main class="hud-page__main">
      <section class="hud" aria-labelledby="hud-title">
        <div class="hud__frame">
          <header class="hud__header">
            <h1 class="hud__title" id="hud-title">Dmitrii / Dimterion</h1>
            <p class="hud__subtitle">Developer / Technical Consultant</p>
          </header>

          <div class="hud__viewport">
            <section
              class="hud-screen"
              data-screen-container
              aria-live="polite"
            ></section>
          </div>
        </div>
      </section>
    </main>

    <footer class="hud-footer">
      <a
        href="https://github.com/Dimterion"
        target="_blank"
        rel="noopener noreferrer"
        class="hud-footer__panel hud-footer__panel--link"
      >
        <p class="hud-footer__value">4+ years</p>
        <h2 class="hud-footer__label">Contributions</h2>
      </a>

      <a
        href="https://medium.com/@dimterion"
        target="_blank"
        rel="noopener noreferrer"
        class="hud-footer__panel hud-footer__panel--link"
      >
        <p class="hud-footer__value">200+</p>
        <h2 class="hud-footer__label">Posts</h2>
      </a>

      <div class="hud-footer__portrait-group">
        <button
          class="hud-footer__screen-button"
          data-screen-direction="left"
          type="button"
          aria-label="Show previous profile section"
        >
          <span aria-hidden="true">◀</span>
        </button>

        <div class="hud-footer__portrait">
          <img
            class="hud-footer__image"
            src="../assets/hud_profile_picture.jpg"
            alt="Profile picture"
          />
        </div>

        <button
          class="hud-footer__screen-button"
          data-screen-direction="right"
          type="button"
          aria-label="Show next profile section"
        >
          <span aria-hidden="true">▶</span>
        </button>
      </div>

      <section class="hud-footer__panel">
        <div class="hud-footer__project-grid" aria-label="Projects"></div>
        <h2 class="hud-footer__label">Projects</h2>
      </section>

      <a
        href="https://www.linkedin.com/in/dmitrii-p/"
        target="_blank"
        rel="noopener noreferrer"
        class="hud-footer__panel hud-footer__panel--link"
      >
        <ul class="hud-footer__experience-list">
          <li class="hud-footer__experience-item">
            <span class="hud-footer__experience-label">Support:</span>
            <span>10+ years</span>
          </li>
          <li class="hud-footer__experience-item">
            <span class="hud-footer__experience-label">Consulting:</span>
            <span>9+ years</span>
          </li>
          <li class="hud-footer__experience-item">
            <span class="hud-footer__experience-label">Writing:</span>
            <span>5+ years</span>
          </li>
          <li class="hud-footer__experience-item">
            <span class="hud-footer__experience-label">Coding:</span>
            <span>4+ years</span>
          </li>
        </ul>
        <h2 class="hud-footer__label">Experience</h2>
      </a>
    </footer>

    <div data-modal-container></div>

    <script src="../scripts/hud-page.js" type="module"></script>
  </body>
</html>
