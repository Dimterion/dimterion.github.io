<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Developer, technical consultant, writer, and web developer profile."
    />
    <link rel="stylesheet" href="../styles/hud-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap"
      rel="stylesheet"
    />
    <title>Dmitrii / Dimterion — Developer and Technical Consultant</title>
  </head>
  <body class="hud-page">
    <main class="hud-page__main">
      <section class="hud" aria-labelledby="hud-title">
        <div class="hud__frame">
          <header class="hud__header">
            <h1 class="hud__title" id="hud-title" data-page-title></h1>
            <p class="hud__subtitle" data-page-subtitle></p>
          </header>

          <div class="hud__viewport">
            <div class="hud__scroll-area">
              <section
                class="hud-screen"
                data-screen-container
                aria-live="polite"
              ></section>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="hud-footer">
      <a
        href="https://github.com/Dimterion"
        target="_blank"
        rel="noopener noreferrer"
        class="hud-footer__panel hud-footer__panel--link"
      >
        <p class="hud-footer__value" data-footer-github-value></p>

        <svg
          class="hud-footer__brand-icon"
          aria-hidden="true"
          focusable="false"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.744.082-.729.082-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.835 2.807 1.305 3.492.998.108-.776.418-1.305.762-1.605-2.665-.303-5.466-1.332-5.466-5.93 0-1.31.468-2.382 1.235-3.222-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.3 1.23A11.49 11.49 0 0 1 12 5.8c1.02.005 2.045.138 3.005.405 2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.233 1.913 1.233 3.222 0 4.61-2.805 5.624-5.477 5.921.43.372.823 1.103.823 2.222 0 1.606-.015 2.898-.015 3.293 0 .322.218.694.825.576C20.565 21.796 24 17.298 24 12c0-6.63-5.373-12-12-12Z"
          />
        </svg>

        <h2 class="hud-footer__label" data-footer-github-label></h2>
      </a>

      <a
        href="https://medium.com/@dimterion"
        target="_blank"
        rel="noopener noreferrer"
        class="hud-footer__panel hud-footer__panel--link"
      >
        <p class="hud-footer__value" data-footer-medium-value></p>

        <svg
          class="hud-footer__brand-icon"
          aria-hidden="true"
          focusable="false"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="M13.54 12c0 3.61-2.91 6.54-6.5 6.54A6.52 6.52 0 0 1 .53 12 6.52 6.52 0 0 1 7.04 5.46c3.59 0 6.5 2.93 6.5 6.54Zm7.13 0c0 3.4-1.45 6.16-3.25 6.16-1.79 0-3.24-2.76-3.24-6.16s1.45-6.16 3.24-6.16c1.8 0 3.25 2.76 3.25 6.16Zm2.8 0c0 3.05-.51 5.52-1.13 5.52-.63 0-1.14-2.47-1.14-5.52s.51-5.52 1.14-5.52c.62 0 1.13 2.47 1.13 5.52Z"
          />
        </svg>

        <h2 class="hud-footer__label" data-footer-medium-label></h2>
      </a>

      <div class="hud-footer__portrait-group">
        <div class="hud-footer__controls hud-footer__controls--left">
          <button
            class="hud-footer__language-button"
            data-language-button
            data-language="en"
            type="button"
          ></button>

          <button
            class="hud-footer__screen-button"
            data-screen-direction="left"
            data-screen-previous-button
            type="button"
          >
            <svg
              class="hud-footer__screen-icon"
              aria-hidden="true"
              focusable="false"
              viewBox="0 0 24 24"
              width="16"
              height="16"
            >
              <path d="M15 6 7 12l8 6Z" fill="currentColor" />
            </svg>
          </button>
        </div>

        <div class="hud-footer__portrait">
          <img
            class="hud-footer__image"
            src="../assets/hud_profile_picture.jpg"
            alt=""
            data-portrait-image
          />
        </div>

        <div class="hud-footer__controls hud-footer__controls--right">
          <button
            class="hud-footer__language-button"
            data-language-button
            data-language="fr"
            type="button"
          ></button>

          <button
            class="hud-footer__screen-button"
            data-screen-direction="right"
            data-screen-next-button
            type="button"
          >
            <svg
              class="hud-footer__screen-icon"
              aria-hidden="true"
              focusable="false"
              viewBox="0 0 24 24"
              width="16"
              height="16"
            >
              <path d="M9 6l8 6-8 6Z" fill="currentColor" />
            </svg>
          </button>
        </div>
      </div>

      <section class="hud-footer__panel">
        <div
          class="hud-footer__project-grid"
          aria-label="Projects"
          data-project-grid
        ></div>
        <h2 class="hud-footer__label" data-footer-projects-label></h2>
      </section>

      <a
        href="https://www.linkedin.com/in/dmitrii-p/"
        target="_blank"
        rel="noopener noreferrer"
        class="hud-footer__panel hud-footer__panel--link"
      >
        <ul
          class="hud-footer__experience-list"
          data-footer-experience-list
        ></ul>
        <h2 class="hud-footer__label" data-footer-experience-label></h2>
      </a>
    </footer>

    <div data-modal-container></div>

    <script src="../scripts/hud-page.js" type="module"></script>
  </body>
</html>
