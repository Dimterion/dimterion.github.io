<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/hud-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap"
      rel="stylesheet"
    />
    <title>HUD</title>
  </head>
  <body class="hud-page">
    <header class="hud-page__header"></header>

    <main class="hud-page__main">
      <section class="hud" aria-labelledby="hud-title">
        <div class="hud__frame">
          <header class="hud__header">
            <h1 class="hud__title" id="hud-title">Profile card</h1>
            <p class="hud__hint">Press A / D to look around</p>
          </header>

          <div class="hud__viewport">
            <section
              class="hud-screen hud-screen--active"
              data-screen-container
              aria-live="polite"
            ></section>
          </div>
        </div>
      </section>
    </main>

    <footer class="hud-footer">
      <section class="hud-footer__panel hud-footer__panel--metric">
        <p class="hud-footer__value">4+ years</p>
        <h2 class="hud-footer__label">Contributions</h2>
      </section>

      <section class="hud-footer__panel hud-footer__panel--metric">
        <p class="hud-footer__value">200+</p>
        <h2 class="hud-footer__label">Posts</h2>
      </section>

      <div class="hud-footer__portrait">
        <img
          class="hud-footer__image"
          src="../assets/profile_picture.jpg"
          alt="Profile picture"
        />
      </div>

      <section class="hud-footer__panel hud-footer__panel--projects">
        <div class="hud-footer__project-grid" aria-label="Projects"></div>
        <h2 class="hud-footer__label">Projects</h2>
      </section>

      <section class="hud-footer__panel hud-footer__panel--experience">
        <ul class="hud-footer__experience-list">
          <li class="hud-footer__experience-item">
            <span>Support:</span>
            10+ years
          </li>
          <li class="hud-footer__experience-item">
            <span>Consulting:</span>
            9+ years
          </li>
          <li class="hud-footer__experience-item">
            <span>Writing:</span> 5+ years
          </li>
          <li class="hud-footer__experience-item">
            <span>Development:</span> 4+ years
          </li>
        </ul>
        <h2 class="hud-footer__label">Experience</h2>
      </section>
    </footer>

    <div data-modal-container></div>

    <script src="../scripts/hud-page.js" type="module"></script>
  </body>
</html>
