<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/hud-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap"
      rel="stylesheet"
    />
    <title>HUD</title>
  </head>
  <body class="hud-page">
    <header class="hud-page__header"></header>

    <main class="hud-page__main">
      <section class="hud" aria-labelledby="hud-title">
        <h1 id="hud-title" class="sr-only">Profile card</h1>
      </section>
    </main>

    <footer class="hud-footer">
      <section class="hud-footer__panel hud-footer__panel--metric">
        <p class="hud-footer__value">4+ years</p>
        <h2 class="hud-footer__label">GitHub daily contributions streak</h2>
      </section>

      <section class="hud-footer__panel hud-footer__panel--metric">
        <p class="hud-footer__value">200+</p>
        <h2 class="hud-footer__label">Posts</h2>
      </section>

      <div class="hud-footer__portrait">
        <img
          class="hud-footer__image"
          src="../assets/profile_picture.jpg"
          alt="Profile picture"
        />
      </div>

      <section class="hud-footer__panel hud-footer__panel--projects">
        <div class="hud-footer__project-grid" aria-label="Projects">
          <button class="hud-footer__project-button" type="button">01</button>
          <button class="hud-footer__project-button" type="button">02</button>
          <button class="hud-footer__project-button" type="button">03</button>
          <button class="hud-footer__project-button" type="button">04</button>
          <button class="hud-footer__project-button" type="button">05</button>
          <button class="hud-footer__project-button" type="button">06</button>
        </div>
        <h2 class="hud-footer__label">Projects</h2>
      </section>

      <section class="hud-footer__panel hud-footer__panel--experience">
        <h2 class="sr-only">Experience</h2>
        <ul class="hud-footer__experience-list">
          <li class="hud-footer__experience-item">
            10+ years / tech consultations
          </li>
          <li class="hud-footer__experience-item">5+ years / tech writing</li>
          <li class="hud-footer__experience-item">
            4+ years / web development
          </li>
        </ul>
      </section>
    </footer>

    <dialog
      class="project-modal"
      id="project-modal-1"
      aria-labelledby="project-modal-1-title"
    >
      <h2 id="project-modal-1-title">Project 01</h2>
      <p>Project details go here.</p>
      <button type="button">Close</button>
    </dialog>
  </body>
</html>
